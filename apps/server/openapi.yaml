                  minLength: 1
                  type: string
                publishedAt:
                  format: date-time
                  type: string
                  x-native-type: date
                roundName:
                  maxLength: 120
                  type: string
                roundNumber:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                scheduledEndAt:
                  format: date-time
                  type: string
                  x-native-type: date
                scheduledStartAt:
                  format: date-time
                  type: string
                  x-native-type: date
                stageGroupId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                stageId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                tournamentId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
              required:
                - tournamentId
                - stageId
                - roundNumber
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /createMatch:
    post:
      operationId: createMatch
      requestBody:
        content:
          application/json:
            schema:
              properties:
                format:
                  type: string
                hasBoundaryOut:
                  type: boolean
                hasBye:
                  type: boolean
                hasLBW:
                  type: boolean
                hasLegBye:
                  type: boolean
                hasSuperOver:
                  type: boolean
                isAbandoned:
                  type: boolean
                isCompleted:
                  type: boolean
                isLive:
                  type: boolean
                isTied:
                  type: boolean
                knockoutLeg:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                margin:
                  type: string
                matchDate:
                  format: date-time
                  type: string
                  x-native-type: date
                matchFormatId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                maxOverPerBowler:
                  minimum: 1
                  type: number
                notes:
                  type: string
                oversPerSide:
                  minimum: 1
                  type: number
                playerOfTheMatchId:
                  type: number
                ranked:
                  type: boolean
                result:
                  type: string
                stageGroupId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                stageId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                stageRound:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                stageSequence:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                team1Id:
                  type: number
                team2Id:
                  type: number
                tossDecision:
                  type: string
                tossWinnerId:
                  type: number
                tournamentId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                venueId:
                  type: number
                winnerId:
                  type: number
              required:
                - tournamentId
                - matchDate
                - tossWinnerId
                - tossDecision
                - team1Id
                - team2Id
                - oversPerSide
                - maxOverPerBowler
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /createMatchFormat:
    post:
      operationId: createMatchFormat
      requestBody:
        content:
          application/json:
            schema:
              properties:
