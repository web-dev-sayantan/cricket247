                        noOfInnings:
                          maximum: 9007199254740991
                          minimum: -9007199254740991
                          type: integer
                        noOfOvers:
                          maximum: 9007199254740991
                          minimum: -9007199254740991
                          type: integer
                        playersPerSide:
                          maximum: 9007199254740991
                          minimum: -9007199254740991
                          type: integer
                        updatedAt:
                          format: date-time
                          type: string
                          x-native-type: date
                      required:
