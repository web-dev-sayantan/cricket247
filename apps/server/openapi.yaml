                      type: integer
                    - type: "null"
                scope:
                  type: string
                shortName:
                  anyOf:
                    - type: string
                    - type: "null"
                slug:
                  type: string
                type:
                  type: string
                updatedAt:
                  format: date-time
                  type: string
                  x-native-type: date
                website:
                  anyOf:
                    - type: string
                    - type: "null"
              required:
