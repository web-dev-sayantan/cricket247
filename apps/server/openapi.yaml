                      - type: string
                      - type: number
                      - type: boolean
                  propertyNames:
                    type: string
                  type: object
                stageId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                tournamentId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
              required:
                - tournamentId
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /createFixtureRound:
    post:
