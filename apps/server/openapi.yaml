info:
  title: Cricket247 API
  version: 1.0.0
openapi: 3.1.1
paths:
  /autoGenerateFixtures:
    post:
      operationId: autoGenerateFixtures
      requestBody:
        content:
          application/json:
            schema:
              properties:
                assignSchedule:
                  const: true
                endDate:
                  format: date-time
                  type: string
                  x-native-type: date
                overwriteDrafts:
                  type: boolean
                respectExistingDrafts:
                  type: boolean
                scope:
                  const: stage
                stageGroupId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                stageId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                startDate:
                  format: date-time
                  type: string
                  x-native-type: date
                timeZone:
                  maxLength: 80
                  minLength: 1
                  type: string
                tournamentId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                venueIds:
                  items:
                    exclusiveMinimum: 0
                    maximum: 9007199254740991
                    minimum: -9007199254740991
                    type: integer
                  type: array
              required:
                - tournamentId
                - scope
                - stageId
                - assignSchedule
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /autoGenerateNextSwissRound:
    post:
      operationId: autoGenerateNextSwissRound
      requestBody:
        content:
          application/json:
            schema:
              properties:
                stageId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                tournamentId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
              required:
                - tournamentId
                - stageId
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /bulkImportPlayers:
    post:
      operationId: bulkImportPlayers
      requestBody:
        content:
          application/json:
            schema:
              properties:
                rows:
                  items:
                    properties:
                      battingStance:
                        maxLength: 50
                        minLength: 1
                        type: string
                      bowlingStance:
                        maxLength: 100
                        minLength: 1
                        type: string
                      dob:
                        format: date-time
                        type: string
                        x-native-type: date
                      height:
                        maximum: 300
                        minimum: 1
                        type: integer
                      image:
                        format: uri
                        type: string
                      isWicketKeeper:
                        type: boolean
                      name:
                        maxLength: 100
                        minLength: 2
                        type: string
                      nationality:
                        maxLength: 100
                        minLength: 1
                        type: string
                      role:
                        maxLength: 50
                        minLength: 1
                        type: string
                      sex:
                        maxLength: 30
                        minLength: 1
                        type: string
                      weight:
                        maximum: 250
                        minimum: 1
                        type: integer
                    required:
                      - name
                      - dob
                      - sex
                      - role
                      - battingStance
                    type: object
                  maxItems: 1000
                  minItems: 1
                  type: array
              required:
                - rows
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /claimablePlayers:
    post:
      operationId: claimablePlayers
      requestBody:
        content:
          application/json:
            schema:
              properties:
                query:
                  maxLength: 100
                  type: string
              type: object
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /completedMatches:
    post:
      operationId: completedMatches
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /createDraftFixtureMatch:
    post:
      operationId: createDraftFixtureMatch
      requestBody:
        content:
          application/json:
            schema:
              properties:
                fixtureRoundId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                notes:
                  maxLength: 500
                  type: string
                participantMode:
                  enum:
                    - concrete
                    - source
                participantSources:
                  items:
                    properties:
                      sourceMatchId:
                        exclusiveMinimum: 0
                        maximum: 9007199254740991
                        minimum: -9007199254740991
                        type: integer
                      sourcePosition:
                        exclusiveMinimum: 0
                        maximum: 9007199254740991
                        minimum: -9007199254740991
                        type: integer
                      sourceStageGroupId:
                        exclusiveMinimum: 0
                        maximum: 9007199254740991
                        minimum: -9007199254740991
                        type: integer
                      sourceStageId:
                        exclusiveMinimum: 0
                        maximum: 9007199254740991
                        minimum: -9007199254740991
                        type: integer
                      sourceTeamId:
                        exclusiveMinimum: 0
                        maximum: 9007199254740991
                        minimum: -9007199254740991
                        type: integer
                      sourceType:
                        enum:
                          - team
                          - match
                          - position
                      teamSlot:
                        anyOf:
                          - const: 1
                          - const: 2
                    required:
                      - teamSlot
                      - sourceType
                    type: object
                  type: array
                scheduledEndAt:
                  format: date-time
                  type: string
                  x-native-type: date
                scheduledStartAt:
                  format: date-time
                  type: string
                  x-native-type: date
                stageGroupId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                stageId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                team1Id:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                team2Id:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                tournamentId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                venueId:
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
              required:
                - tournamentId
                - stageId
                - participantMode
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /createFixtureDraft:
    post:
      operationId: createFixtureDraft
      requestBody:
        content:
          application/json:
            schema:
              properties:
                includeCurrentMatches:
