                    - type: "null"
                isDrawAllowed:
                  type: boolean
                isSuperOverAllowed:
                  type: boolean
                maxLegalBallsPerInnings:
                  anyOf:
                    - maximum: 9007199254740991
                      minimum: -9007199254740991
                      type: integer
                    - type: "null"
                maxOversPerBowler:
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                minutesPerInnings:
                  anyOf:
                    - maximum: 9007199254740991
                      minimum: -9007199254740991
                      type: integer
                    - type: "null"
                name:
                  type: string
                noOfInnings:
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                noOfOvers:
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                playersPerSide:
                  maximum: 9007199254740991
                  minimum: -9007199254740991
                  type: integer
                updatedAt:
                  format: date-time
                  type: string
                  x-native-type: date
              required:
                - name
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - {}
                  - not: {}
          description: OK
  /createNextScoringDelivery:
    post:
      operationId: createNextScoringDelivery
      requestBody:
        content:
          application/json:
